name: Scan Vinted market

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      action_id:
        description: >
          UUID de la ligne action_log a mettre a jour (scan a la demande
          depuis "Scanner maintenant" - voir supabase/functions/scan-market).
          Laisser vide pour une execution normale du cron, auquel cas aucune
          progression n'est journalisee (comportement inchange).
        required: false
        type: string

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run scan
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ACTION_ID: ${{ github.event.inputs.action_id }}
